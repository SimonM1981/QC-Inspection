<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Inspection - Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  .header-left { display: flex; align-items: center; gap: 15px; }
  .logo-icon {
    width: 45px; height: 45px;
    background: linear-gradient(135deg, #e94560, #ff6b6b);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 20px;
  }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 15px; }
  .user-info {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.1);
    padding: 8px 16px;
    border-radius: 25px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    background: #e94560;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 14px;
  }
  .btn-logout {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-logout:hover { background: rgba(233,69,96,0.3); }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: white;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    transition: transform 0.3s;
  }
  .stat-card:hover { transform: translateY(-5px); }
  .stat-icon {
    width: 50px; height: 50px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 15px;
  }
  .stat-icon.pending { background: #fff3e0; color: #ff9800; }
  .stat-icon.progress { background: #e3f2fd; color: #2196f3; }
  .stat-icon.waiting { background: #fce4ec; color: #e91e63; }
  .stat-icon.approved { background: #e8f5e9; color: #4caf50; }
  .stat-number { font-size: 32px; font-weight: 700; color: #1a1a2e; }
  .stat-label { color: #666; font-size: 14px; margin-top: 5px; }

  .section-title {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .menu-card {
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    color: inherit;
    display: block;
    border-left: 4px solid transparent;
  }
  .menu-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  }
  .menu-card.manager { border-left-color: #ffd700; }
  .menu-card.chief { border-left-color: #4ecdc4; }
  .menu-card.staff { border-left-color: #95a5a6; }
  .menu-card.all { border-left-color: #e94560; }

  .menu-icon {
    width: 60px; height: 60px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 15px;
  }
  .menu-icon.setup { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
  .menu-icon.post { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
  .menu-icon.inspect { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
  .menu-icon.approve { background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; }
  .menu-icon.history { background: linear-gradient(135deg, #fa709a, #fee140); color: white; }
  .menu-icon.print { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #333; }

  .menu-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .menu-desc { color: #666; font-size: 14px; line-height: 1.5; }
  .menu-role {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 15px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
  }
  .menu-role.manager { background: #fff8dc; color: #b8860b; }
  .menu-role.chief { background: #e0f7fa; color: #00838f; }
  .menu-role.staff { background: #eceff1; color: #546e7a; }
  .menu-role.all { background: #fce4ec; color: #c2185b; }

  .recent-jobs {
    background: white;
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  .job-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  .job-table th {
    text-align: left;
    padding: 12px;
    background: #f8f9fa;
    color: #666;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .job-table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  .job-table tr:hover { background: #f8f9fa; }
  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-pending { background: #fff3e0; color: #e65100; }
  .status-progress { background: #e3f2fd; color: #1565c0; }
  .status-waiting { background: #fce4ec; color: #ad1457; }
  .status-approved { background: #e8f5e9; color: #2e7d32; }
  .status-rejected { background: #ffebee; color: #c62828; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-icon">QC</div>
    <div>
      <h1>QC Inspection System</h1>
      <div style="font-size: 12px; opacity: 0.8;">Megacell International Co., Ltd.</div>
    </div>
  </div>
  <div class="header-right">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">U</div>
      <div>
        <div id="userName" style="font-weight: 600; font-size: 14px;">User</div>
        <div id="userRole" style="font-size: 12px; opacity: 0.7;">Role</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon pending">&#9203;</div>
      <div class="stat-number" id="statPending">0</div>
      <div class="stat-label">Pending Jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon progress">&#128295;</div>
      <div class="stat-number" id="statProgress">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon waiting">&#9208;&#65039;</div>
      <div class="stat-number" id="statWaiting">0</div>
      <div class="stat-label">Waiting Approval</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon approved">&#9989;</div>
      <div class="stat-number" id="statApproved">0</div>
      <div class="stat-label">Approved Today</div>
    </div>
  </div>

  <div class="section-title">&#128203; Quick Access</div>
  <div class="menu-grid" id="menuGrid"></div>

  <div class="section-title">&#128202; Recent Jobs</div>
  <div class="recent-jobs">
    <table class="job-table">
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Part Number</th>
          <th>Description</th>
          <th>Supplier</th>
          <th>Status</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="recentJobsBody">
        <tr><td colspan="6" style="text-align:center; color:#999;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API_URL = localStorage.getItem('gasApiUrl') || '';
let currentUser = null;

function init() {
  const userStr = localStorage.getItem('qcUser');
  if (!userStr) {
    window.location.href = 'login.html';
    return;
  }
  if (!API_URL) {
    alert('Please login again to configure API URL');
    window.location.href = 'login.html';
    return;
  }
  currentUser = JSON.parse(userStr);
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userRole').textContent = currentUser.role;
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

  setupMenu();
  loadStats();
  loadRecentJobs();
}

function setupMenu() {
  const menuGrid = document.getElementById('menuGrid');
  const role = currentUser.role;

  const menus = [];

  if (role === 'Manager') {
    menus.push({
      href: 'setup.html',
      icon: 'setup', iconText: '&#9881;&#65039;',
      title: 'Template Setup',
      desc: 'Configure inspection templates, measurements, check points, and reference photos for each part number.',
      roleClass: 'manager', roleText: 'Manager Only'
    });
  }

  if (role === 'Manager' || role === 'QC Chief') {
    menus.push({
      href: 'post.html',
      icon: 'post', iconText: '&#128221;',
      title: 'Post New Job',
      desc: 'Create new inspection jobs for incoming parts. Select part number, enter PO details, and assign to staff.',
      roleClass: 'chief', roleText: 'Manager / QC Chief'
    });
    menus.push({
      href: 'approve.html',
      icon: 'approve', iconText: '&#10003;',
      title: 'Approval',
      desc: 'Review completed inspections, approve or reject with remarks. View measurement data and photos.',
      roleClass: 'chief', roleText: 'Manager / QC Chief'
    });
  }

  if (role === 'Staff' || role === 'QC Chief') {
    menus.push({
      href: 'inspect.html',
      icon: 'inspect', iconText: '&#128269;',
      title: 'Inspection',
      desc: 'Perform inspections on assigned jobs. Enter measurements with live spec validation, take photos, and submit.',
      roleClass: 'staff', roleText: 'Staff / QC Chief'
    });
  }

  menus.push({
    href: 'history.html',
    icon: 'history', iconText: '&#128218;',
    title: 'History & Reports',
    desc: 'Search and view all inspection history. Filter by part, date, supplier, or status. Print reports with ISO Doc No.',
    roleClass: 'all', roleText: 'All Users'
  });

  menuGrid.innerHTML = menus.map(m => `
    <a href="${m.href}" class="menu-card ${m.roleClass}">
      <div class="menu-icon ${m.icon}">${m.iconText}</div>
      <div class="menu-title">${m.title}</div>
      <div class="menu-desc">${m.desc}</div>
      <span class="menu-role ${m.roleClass}">${m.roleText}</span>
    </a>
  `).join('');
}

async function loadStats() {
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'getPendingJobs',
        data: {}
      })
    });
    const result = await response.json();

    if (result.success) {
      const jobs = result.jobs || [];
      document.getElementById('statPending').textContent = jobs.filter(j => j.status === 'Pending').length;
      document.getElementById('statProgress').textContent = jobs.filter(j => j.status === 'In Progress').length;
      document.getElementById('statWaiting').textContent = jobs.filter(j => j.status === 'Waiting Approval').length;
      document.getElementById('statApproved').textContent = jobs.filter(j => j.status === 'Approved').length;
    }
  } catch(e) {
    console.error('Stats error:', e);
  }
}

async function loadRecentJobs() {
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'getHistory',
        data: {limit: 10}
      })
    });
    const result = await response.json();

    const tbody = document.getElementById('recentJobsBody');
    if (result.success && result.jobs && result.jobs.length > 0) {
      tbody.innerHTML = result.jobs.slice(0, 10).map(job => {
        const statusClass = 'status-' + job.status.toLowerCase().replace(/\s+/g, '-');
        return `
          <tr>
            <td><strong>${job.jobId}</strong></td>
            <td>${job.partNo}</td>
            <td>${job.description || '-'}</td>
            <td>${job.supplier || '-'}</td>
            <td><span class="status-badge ${statusClass}">${job.status}</span></td>
            <td>${job.incomingDate || '-'}</td>
          </tr>
        `;
      }).join('');
    } else {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">No jobs found</td></tr>';
    }
  } catch(e) {
    document.getElementById('recentJobsBody').innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">Error loading jobs</td></tr>';
  }
}

function logout() {
  localStorage.removeItem('qcUser');
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
