<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Inspection Report</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', 'Helvetica', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    padding: 20px;
  }
  .print-container {
    max-width: 1100px;
    margin: 0 auto;
    background: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    padding: 40px;
  }

  .print-header {
    text-align: center;
    border-bottom: 3px solid #1a1a2e;
    padding-bottom: 20px;
    margin-bottom: 30px;
  }
  .print-header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }
  .print-header .company {
    font-size: 14px;
    color: #666;
    font-weight: 600;
  }
  .iso-badge {
    display: inline-block;
    background: #1a1a2e;
    color: white;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    margin-top: 10px;
  }

  .info-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }
  .info-block {
    border: 1px solid #ddd;
    padding: 15px;
    border-radius: 8px;
  }
  .info-block.full-width {
    grid-column: 1 / -1;
  }
  .info-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .info-value {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
    margin: 25px 0 15px;
    padding-bottom: 8px;
    border-bottom: 2px solid #1a1a2e;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .measurement-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 25px;
  }
  .measurement-table th {
    background: #1a1a2e;
    color: white;
    padding: 10px;
    text-align: center;
    font-weight: 600;
    border: 1px solid #333;
  }
  .measurement-table td {
    padding: 10px;
    text-align: center;
    border: 1px solid #ddd;
    font-size: 13px;
  }
  .measurement-table .sample-col {
    background: #f0f0f0;
    font-weight: 700;
    width: 60px;
  }
  .measurement-table .pass { background: #d4edda; color: #155724; font-weight: 600; }
  .measurement-table .fail { background: #f8d7da; color: #721c24; font-weight: 600; }
  .measurement-table .spec-row { background: #fff3cd; font-weight: 600; }
  .measurement-table .tool-row { background: #e2e3e5; font-style: italic; font-size: 11px; }

  .checkpoint-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 25px;
  }
  .checkpoint-table th {
    background: #1a1a2e;
    color: white;
    padding: 10px;
    text-align: left;
    font-weight: 600;
    border: 1px solid #333;
  }
  .checkpoint-table td {
    padding: 10px;
    border: 1px solid #ddd;
  }
  .checkpoint-table .num-col {
    width: 50px;
    text-align: center;
    font-weight: 700;
    background: #f0f0f0;
  }
  .checkpoint-table .result-col {
    width: 100px;
    text-align: center;
    font-weight: 700;
  }
  .checkpoint-table .ok { background: #d4edda; color: #155724; }
  .checkpoint-table .ng { background: #f8d7da; color: #721c24; }
  .checkpoint-table .na { background: #e2e3e5; color: #383d41; }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 25px;
  }
  .photo-item {
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
  }
  .photo-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
  }
  .photo-item .caption {
    padding: 8px;
    text-align: center;
    font-size: 12px;
    color: #666;
    background: #f8f9fa;
  }

  .remarks-box {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    min-height: 80px;
    margin-bottom: 25px;
    background: #fafafa;
  }
  .remarks-label {
    font-size: 12px;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .remarks-text {
    font-size: 14px;
    color: #333;
    line-height: 1.6;
  }

  .signature-section {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    margin-top: 40px;
    page-break-inside: avoid;
  }
  .signature-box {
    text-align: center;
  }
  .signature-line {
    border-top: 1px solid #333;
    margin-top: 60px;
    padding-top: 10px;
    font-size: 13px;
    font-weight: 600;
  }
  .signature-role {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }

  .result-section {
    display: flex;
    justify-content: flex-end;
    gap: 20px;
    margin: 30px 0;
    padding: 20px;
    background: #f8f9fa;
    border-radius: 8px;
  }
  .result-box {
    padding: 15px 30px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    min-width: 120px;
  }
  .result-ok { background: #d4edda; color: #155724; border: 2px solid #28a745; }
  .result-ng { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }

  .print-actions {
    position: fixed;
    bottom: 30px;
    right: 30px;
    display: flex;
    gap: 10px;
  }
  .btn-print-action {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
  }
  .btn-print-action:hover { transform: translateY(-2px); }
  .btn-print-green { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }
  .btn-print-blue { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }

  @media print {
    body { background: white; padding: 0; }
    .print-container { box-shadow: none; padding: 20px; }
    .print-actions { display: none !important; }
    .photo-item img { height: 150px; }
  }

  @media (max-width: 768px) {
    .print-container { padding: 20px; }
    .info-section { grid-template-columns: 1fr; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); }
    .signature-section { grid-template-columns: 1fr; }
    .measurement-table { font-size: 11px; }
    .measurement-table th, .measurement-table td { padding: 6px; }
  }
</style>
</head>
<body>
<div class="print-container" id="printContainer">
  <div style="text-align:center;padding:40px;color:#999;">
    <div style="font-size:40px;margin-bottom:20px;">&#9203;</div>
    <h2>Loading Report...</h2>
    <p>Please wait while we generate the inspection report</p>
  </div>
</div>

<div class="print-actions">
  <button class="btn-print-action btn-print-blue" onclick="window.print()">&#128424;&#65039; Print</button>
  <button class="btn-print-action btn-print-green" onclick="downloadExcel()">&#128202; Excel</button>
</div>

<script>
const API_URL = localStorage.getItem('gasApiUrl') || '';

function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const jobId = urlParams.get('jobId');

  if (!jobId) {
    document.getElementById('printContainer').innerHTML = `
      <div style="text-align:center;padding:40px;color:#999;">
        <div style="font-size:40px;margin-bottom:20px;">&#10060;</div>
        <h2>No Job ID Provided</h2>
        <p>Please access this page from the history or approval section</p>
      </div>
    `;
    return;
  }

  if (!API_URL) {
    document.getElementById('printContainer').innerHTML = `
      <div style="text-align:center;padding:40px;color:#999;">
        <div style="font-size:40px;margin-bottom:20px;">&#9888;&#65039;</div>
        <h2>API Not Configured</h2>
        <p>Please login first to configure the API URL</p>
      </div>
    `;
    return;
  }

  loadJobReport(jobId);
}

async function loadJobReport(jobId) {
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'getJobForPrint',
        data: {jobId: jobId}
      })
    });
    const result = await response.json();

    if (result.success && result.job) {
      renderReport(result.job);
    } else {
      document.getElementById('printContainer').innerHTML = `
        <div style="text-align:center;padding:40px;color:#999;">
          <div style="font-size:40px;margin-bottom:20px;">&#10060;</div>
          <h2>Job Not Found</h2>
          <p>${result.error || 'Unable to load inspection report'}</p>
        </div>
      `;
    }
  } catch(e) {
    document.getElementById('printContainer').innerHTML = `
      <div style="text-align:center;padding:40px;color:#999;">
        <div style="font-size:40px;margin-bottom:20px;">&#10060;</div>
        <h2>Error Loading Report</h2>
        <p>${e.message}</p>
      </div>
    `;
  }
}

function renderReport(job) {
  const container = document.getElementById('printContainer');
  const template = job.template || {};
  const inspection = job.inspectionData || {};

  let html = `
    <div class="print-header">
      <h1>INCOMING INSPECTION REPORT</h1>
      <div class="company">MEGACELL INTERNATIONAL CO., LTD.</div>
      ${job.isoDocNo ? `<div class="iso-badge">ISO Doc No: ${job.isoDocNo}</div>` : ''}
    </div>

    <div class="info-section">
      <div class="info-block">
        <div class="info-label">Part Number</div>
        <div class="info-value">${job.partNo}</div>
      </div>
      <div class="info-block">
        <div class="info-label">Description</div>
        <div class="info-value">${job.description || 'N/A'}</div>
      </div>
      <div class="info-block">
        <div class="info-label">PO Number</div>
        <div class="info-value">${job.poNo || 'N/A'}</div>
      </div>
      <div class="info-block">
        <div class="info-label">Supplier</div>
        <div class="info-value">${job.supplier || 'N/A'}</div>
      </div>
      <div class="info-block">
        <div class="info-label">Quantity</div>
        <div class="info-value">${job.qty || 'N/A'} Pcs</div>
      </div>
      <div class="info-block">
        <div class="info-label">Sample Qty</div>
        <div class="info-value">${job.sampleQty || '10'} Pcs</div>
      </div>
      <div class="info-block">
        <div class="info-label">Incoming Date</div>
        <div class="info-value">${job.incomingDate || 'N/A'}</div>
      </div>
      <div class="info-block">
        <div class="info-label">Inspection Date</div>
        <div class="info-value">${job.postedTime ? job.postedTime.split(' ')[0] : new Date().toISOString().split('T')[0]}</div>
      </div>
      <div class="info-block full-width">
        <div class="info-label">Job ID</div>
        <div class="info-value">${job.jobId}</div>
      </div>
    </div>
  `;

  // Measurements Section
  if (template.measurements && template.measurements.length > 0) {
    html += `<div class="section-title">&#128207; Standard Check Dimension</div>`;

    const measurements = template.measurements;
    const sampleQty = parseInt(job.sampleQty) || 10;

    html += `<table class="measurement-table">`;
    html += `<thead><tr><th>SAMPLE</th>`;
    measurements.forEach(m => {
      html += `<th>${m.name}<br><span style="font-size:11px;font-weight:400;">${m.spec}</span></th>`;
    });
    html += `</tr></thead>`;

    // Spec row
    html += `<tr class="spec-row"><td class="sample-col">SPEC</td>`;
    measurements.forEach(m => {
      html += `<td>${m.spec}</td>`;
    });
    html += `</tr>`;

    // Tool row
    html += `<tr class="tool-row"><td class="sample-col">TOOL</td>`;
    measurements.forEach(m => {
      html += `<td>${m.tool || 'N/A'}</td>`;
    });
    html += `</tr>`;

    // Sample data rows
    if (inspection.measurements) {
      for (let s = 1; s <= sampleQty; s++) {
        html += `<tr><td class="sample-col">${s}</td>`;
        measurements.forEach((m, idx) => {
          const key = `S${s}_M${idx}`;
          const val = inspection.measurements[key] || '-';
          const isPass = val !== '-' ? checkSpec(val, m.spec) : true;
          const cellClass = val === '-' ? '' : (isPass ? 'pass' : 'fail');
          html += `<td class="${cellClass}">${val}</td>`;
        });
        html += `</tr>`;
      }
    } else {
      for (let s = 1; s <= sampleQty; s++) {
        html += `<tr><td class="sample-col">${s}</td>`;
        measurements.forEach(() => {
          html += `<td>-</td>`;
        });
        html += `</tr>`;
      }
    }
    html += `</table>`;
  }

  // Check Points Section
  if (template.checkPoints && template.checkPoints.length > 0) {
    html += `<div class="section-title">&#9989; Standard Sampling Appearance: 100%</div>`;

    html += `<table class="checkpoint-table">`;
    html += `<thead><tr><th class="num-col">No.</th><th>Check Point Inspection</th><th class="result-col">Result</th></tr></thead>`;
    html += `<tbody>`;

    template.checkPoints.forEach((cp, idx) => {
      const result = inspection.checkPoints ? (inspection.checkPoints[cp.id] || 'N/A') : 'N/A';
      const resultClass = result.toLowerCase();
      html += `
        <tr>
          <td class="num-col">${cp.id}</td>
          <td>
            <div style="font-weight:600;">${cp.nameEn}</div>
            <div style="font-size:12px;color:#666;">${cp.nameTh}</div>
          </td>
          <td class="result-col ${resultClass}">${result}</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
  }

  // Photos Section
  if (inspection.photos && inspection.photos.length > 0) {
    html += `<div class="section-title">&#128248; Inspection Photos</div>`;
    html += `<div class="photo-grid">`;
    inspection.photos.forEach((p, idx) => {
      if (p && p.fileUrl) {
        html += `
          <div class="photo-item">
            <img src="${p.fileUrl}" alt="Photo ${idx + 1}">
            <div class="caption">Photo ${idx + 1}</div>
          </div>
        `;
      }
    });
    html += `</div>`;
  }

  // Remarks
  html += `<div class="section-title">&#128221; Remarks</div>`;
  html += `<div class="remarks-box">`;
  html += `<div class="remarks-label">Inspector Remarks</div>`;
  html += `<div class="remarks-text">${inspection.remarks || 'No remarks provided'}</div>`;
  html += `</div>`;

  // Result
  html += `<div class="result-section">`;
  html += `<div class="result-box ${job.status === 'Approved' ? 'result-ok' : (job.status === 'Rejected' ? 'result-ng' : '')}">`;
  html += `<div style="font-size:12px;margin-bottom:5px;">FINAL RESULT</div>`;
  html += job.status === 'Approved' ? '&#10003; OK' : (job.status === 'Rejected' ? '&#10007; NG' : 'PENDING');
  html += `</div>`;
  html += `</div>`;

  // Signatures
  html += `<div class="signature-section">`;
  html += `
    <div class="signature-box">
      <div class="signature-line">INSPECTION BY</div>
      <div class="signature-role">${inspection.staffName || '_________________'}</div>
    </div>
    <div class="signature-box">
      <div class="signature-line">CHECKED BY</div>
      <div class="signature-role">QC Chief</div>
    </div>
    <div class="signature-box">
      <div class="signature-line">APPROVED BY</div>
      <div class="signature-role">Manager</div>
    </div>
  `;
  html += `</div>`;

  // Footer
  html += `<div style="margin-top:30px;padding-top:20px;border-top:1px solid #ddd;font-size:11px;color:#999;text-align:center;">`;
  html += `Generated by QC Inspection System | Megacell International Co., Ltd. | ${new Date().toLocaleString()}`;
  html += `</div>`;

  container.innerHTML = html;
}

function checkSpec(value, specStr) {
  if (!specStr || !value || value === '-') return true;

  if (specStr.indexOf('mm') !== -1 && isNaN(parseFloat(specStr))) {
    return value.toUpperCase() === specStr.toUpperCase();
  }

  const numVal = parseFloat(value);
  if (isNaN(numVal)) return true;

  let match = specStr.match(/([\d.]+)\s*[+/-]+\s*([\d.]+)/);
  if (match) {
    const nominal = parseFloat(match[1]);
    const tolerance = parseFloat(match[2]);
    return numVal >= (nominal - tolerance) && numVal <= (nominal + tolerance);
  }

  return true;
}

async function downloadExcel() {
  const urlParams = new URLSearchParams(window.location.search);
  const jobId = urlParams.get('jobId');
  if (!jobId || !API_URL) return;

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action: 'generateExcelReport',
        data: {jobId: jobId}
      })
    });
    const result = await response.json();

    if (result.success && result.downloadUrl) {
      window.open(result.downloadUrl, '_blank');
    } else {
      alert('Error generating Excel: ' + (result.error || 'Unknown error'));
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

init();
</script>
</body>
</html>
